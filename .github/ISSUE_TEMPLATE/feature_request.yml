name: 💡 Feature Request / 功能建议
description: Suggest a new feature / 建议一个新功能
title: "[Feature] "
labels: [enhancement]
body:
  - type: textarea
    id: description
    attributes:
      label: Description / 功能描述
      description: What feature would you like? / 你希望添加什么功能？
    validations:
      required: true
  - type: textarea
    id: usecase
    attributes:
      label: Use Case / 使用场景
      description: When would you need this? / 什么场景下需要这个功能？
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives / 替代方案
      description: Any other ways to achieve this? / 有其他实现方式吗？
